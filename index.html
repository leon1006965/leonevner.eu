<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- Essential for the small S2 screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Downloads</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            color: #0078d7;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            border-bottom: 1px solid #eee;
            padding: 15px 5px;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-name {
            display: block;
            font-size: 16px;
            font-weight: bold;
            word-break: break-all;
            margin-bottom: 10px;
        }
        .download-btn {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
        }
        #status {
            text-align: center;
            padding: 20px;
            font-style: italic;
            color: #666;
        }
        .error-container {
            display: none;
            background: #fff0f0;
            border: 1px solid #ffa3a3;
            padding: 15px;
            margin-top: 10px;
            border-radius: 4px;
        }
        .error-text {
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .manual-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .retry-btn {
            background: #0078d7;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>App Downloads</h1>
        
        <div id="status">Loading files...</div>

        <div id="error-box" class="error-container">
            <div class="error-text" id="error-msg">API Error</div>
            <p style="font-size:12px;">The GitHub API might be rate-limiting you or the repo is private. Enter branch name if 'main' fails:</p>
            <input type="text" id="branch-input" class="manual-input" value="main">
            <button class="retry-btn" onclick="loadFiles()">Retry Loading</button>
        </div>

        <ul id="apk-list" class="file-list"></ul>
    </div>

    <script type="text/javascript">
        // --- HARDCODED CONFIG ---
        var GITHUB_USER = "leon1006965";
        var GITHUB_REPO = "leonevner.eu";
        // ------------------------

        var listElement = document.getElementById("apk-list");
        var statusElement = document.getElementById("status");
        var errorBox = document.getElementById("error-box");
        var errorMsg = document.getElementById("error-msg");

        function loadFiles() {
            var branch = document.getElementById("branch-input").value || "main";
            errorBox.style.display = "none";
            statusElement.style.display = "block";
            statusElement.innerHTML = "Fetching files for " + GITHUB_USER + "...";
            listElement.innerHTML = "";

            var apiUrL = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/contents/";
            
            var xhr = new XMLHttpRequest();
            xhr.open("GET", apiUrL, true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var files = JSON.parse(xhr.responseText);
                        renderList(files, branch);
                    } else {
                        statusElement.style.display = "none";
                        errorBox.style.display = "block";
                        errorMsg.innerHTML = "GitHub Error (" + xhr.status + ")";
                    }
                }
            };
            xhr.send();
        }

        function renderList(files, branch) {
            var foundApk = false;
            statusElement.style.display = "none";
            
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                var fileNameLower = file.name.toLowerCase();
                
                // Simple extension check compatible with old JS
                if (fileNameLower.substring(fileNameLower.length - 4) === ".apk") {
                    foundApk = true;
                    
                    var li = document.createElement("li");
                    li.className = "file-item";
                    
                    var downloadUrl = "https://raw.githubusercontent.com/" + GITHUB_USER + "/" + GITHUB_REPO + "/" + branch + "/" + file.name;
                    
                    li.innerHTML = 
                        '<span class="file-name">' + file.name + '</span>' +
                        '<a href="' + downloadUrl + '" class="download-btn">Download APK</a>';
                    
                    listElement.appendChild(li);
                }
            }

            if (!foundApk) {
                statusElement.style.display = "block";
                statusElement.innerHTML = "No APK files found in the root directory.";
            }
        }

        // Initialize
        window.onload = loadFiles;
    </script>
</body>
</html>
