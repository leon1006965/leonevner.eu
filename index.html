<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- Essential for the small S2 screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Downloads</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            color: #0078d7;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            border-bottom: 1px solid #eee;
            padding: 15px 5px;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-name {
            display: block;
            font-size: 16px;
            font-weight: bold;
            word-break: break-all;
            margin-bottom: 10px;
        }
        .download-btn {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
        }
        #status {
            text-align: center;
            padding: 20px;
            font-style: italic;
            color: #666;
        }
        .error {
            color: red;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>App Downloads</h1>
        <div id="status">Loading files from leonevner.eu...</div>
        <ul id="apk-list" class="file-list"></ul>
    </div>

    <script type="text/javascript">
        // --- FIXED CONFIGURATION FOR YOUR REPO ---
        var GITHUB_USER = "leon1006965";
        var GITHUB_REPO = "leonevner.eu";
        var BRANCH = "main"; // Change to "master" if your repo uses the old default
        // -----------------------------------------

        var listElement = document.getElementById("apk-list");
        var statusElement = document.getElementById("status");

        function loadFiles() {
            var apiUrL = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/contents/";
            
            var xhr = new XMLHttpRequest();
            xhr.open("GET", apiUrL, true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var files = JSON.parse(xhr.responseText);
                        renderList(files);
                    } else {
                        statusElement.innerHTML = "Error " + xhr.status + ": Could not fetch file list.<br>Ensure the repository is Public.";
                        statusElement.className = "error";
                    }
                }
            };
            xhr.send();
        }

        function renderList(files) {
            var foundApk = false;
            statusElement.style.display = "none";
            listElement.innerHTML = ""; 
            
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                // Check for .apk extension (case insensitive)
                if (file.name.toLowerCase().substring(file.name.length - 4) === ".apk") {
                    foundApk = true;
                    
                    var li = document.createElement("li");
                    li.className = "file-item";
                    
                    // Direct download link from GitHub Raw
                    var downloadUrl = "https://raw.githubusercontent.com/" + GITHUB_USER + "/" + GITHUB_REPO + "/" + BRANCH + "/" + file.name;
                    
                    li.innerHTML = 
                        '<span class="file-name">' + file.name + '</span>' +
                        '<a href="' + downloadUrl + '" class="download-btn">Download APK</a>';
                    
                    listElement.appendChild(li);
                }
            }

            if (!foundApk) {
                statusElement.style.display = "block";
                statusElement.innerHTML = "No APK files found in the root of the repository.";
            }
        }

        // Start the process
        window.onload = loadFiles;
    </script>
</body>
</html>
