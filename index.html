<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Wiedza o Mostach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
        }
        h1, h2 {
            font-family: 'Playfair Display', serif;
        }
        .option-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .option-card:hover {
            background-color: #2d3748;
            transform: translateY(-2px);
        }
        .option-card.selected {
            border-color: #c5a059;
            background-color: #2d3748;
        }
        .option-card.correct {
            border-color: #48bb78;
            background-color: rgba(72, 187, 120, 0.1);
        }
        .option-card.wrong {
            border-color: #f56565;
            background-color: rgba(245, 101, 101, 0.1);
        }
        .progress-bar {
            height: 8px;
            background-color: #2d3748;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #c5a059;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="max-w-2xl w-full bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl text-center text-white mb-2">Quiz: Cuda Inżynierii</h1>
            <p class="text-gray-400 text-center text-sm uppercase tracking-widest">Sprawdź swoją wiedzę o mostach</p>
            <div class="mt-6 progress-bar">
                <div id="progress" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Question Section -->
        <div id="question-view">
            <div class="mb-6">
                <span id="q-number" class="text-sm font-bold text-yellow-500 uppercase">Pytanie 1 z 5</span>
                <h2 id="q-text" class="text-2xl text-white mt-2 leading-tight">Ładowanie pytania...</h2>
            </div>

            <div id="options-container" class="space-y-3">
                <!-- Options will be injected here -->
            </div>

            <div id="feedback" class="mt-6 p-4 rounded-lg hidden">
                <p id="feedback-text" class="text-sm"></p>
            </div>

            <button id="next-btn" class="mt-8 w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-6 rounded-lg transition hidden">
                Następne pytanie
            </button>
        </div>

        <!-- Results Section -->
        <div id="result-view" class="hidden text-center py-10">
            <h2 class="text-4xl text-white mb-4">Koniec Quizu!</h2>
            <div class="text-6xl font-bold text-yellow-500 mb-6" id="final-score">0/0</div>
            <p id="result-message" class="text-xl text-gray-300 mb-8"></p>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition">
                Spróbuj ponownie
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Który typ mostu jest najstarszy i opiera się na prostych poziomach podpartych na końcach?",
                options: ["Most wiszący", "Most belkowy", "Most łukowy", "Most wantowy"],
                correct: 1,
                feedback: "Mosty belkowe to najbardziej podstawowa konstrukcja, wywodząca się od kłód rzuconych przez strumień."
            },
            {
                question: "W jaki sposób mosty łukowe radzą sobie z obciążeniem?",
                options: [
                    "Wykorzystują tylko liny",
                    "Zmieniają rozciąganie na ściskanie",
                    "Nie potrzebują fundamentów",
                    "Zawsze są ruchome"
                ],
                correct: 1,
                feedback: "Krzywizna łuku przekazuje siły bezpośrednio na podpory poprzez proces ściskania materiału."
            },
            {
                question: "Który most pozwala na największe rozpiętości bez podpór pośrednich?",
                options: ["Most kratownicowy", "Most ruchomy", "Most wiszący", "Most łukowy"],
                correct: 2,
                feedback: "Mosty wiszące (jak Golden Gate) mogą pokonywać dystanse kilku kilometrów dzięki systemowi potężnych lin."
            },
            {
                question: "Co jest charakterystycznym elementem mostu wantowego?",
                options: [
                    "Drewniane pale",
                    "Ukośne liny łączące pylon z pomostem",
                    "Brak jezdni",
                    "Ruchome przęsła"
                ],
                correct: 1,
                feedback: "W mostach wantowych (podwieszanych) liny biegną ukośnie od wysokich pylonów wprost do krawędzi jezdni."
            },
            {
                question: "Gdzie znajduje się najdłuższy most na świecie (Danyang-Kunshan)?",
                options: ["USA", "Turcja", "Chiny", "Francja"],
                correct: 2,
                feedback: "Ten gigantyczny wiadukt kolejowy o długości ponad 164 km znajduje się w Chinach."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        const qText = document.getElementById('q-text');
        const qNumber = document.getElementById('q-number');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const progress = document.getElementById('progress');

        function loadQuestion() {
            answered = false;
            const data = quizData[currentQuestion];
            qNumber.innerText = `Pytanie ${currentQuestion + 1} z ${quizData.length}`;
            qText.innerText = data.question;
            progress.style.width = `${(currentQuestion / quizData.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                const div = document.createElement('div');
                div.className = 'option-card bg-gray-700 p-4 rounded-lg text-gray-200';
                div.innerText = opt;
                div.onclick = () => selectOption(index, div);
                optionsContainer.appendChild(div);
            });

            feedback.classList.add('hidden');
            nextBtn.classList.add('hidden');
        }

        function selectOption(index, element) {
            if (answered) return;
            answered = true;
            
            const correctIndex = quizData[currentQuestion].correct;
            const allOptions = optionsContainer.children;

            if (index === correctIndex) {
                element.classList.add('correct');
                score++;
                feedback.className = 'mt-6 p-4 rounded-lg bg-green-900/30 border border-green-500 text-green-400';
                feedbackText.innerHTML = "<strong>Brawo!</strong> " + quizData[currentQuestion].feedback;
            } else {
                element.classList.add('wrong');
                allOptions[correctIndex].classList.add('correct');
                feedback.className = 'mt-6 p-4 rounded-lg bg-red-900/30 border border-red-500 text-red-400';
                feedbackText.innerHTML = "<strong>Błąd.</strong> " + quizData[currentQuestion].feedback;
            }

            feedback.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
            
            if (currentQuestion === quizData.length - 1) {
                nextBtn.innerText = "Zobacz wyniki";
            }
        }

        nextBtn.onclick = () => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            document.getElementById('question-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            progress.style.width = '100%';
            
            const scoreDisplay = document.getElementById('final-score');
            scoreDisplay.innerText = `${score} / ${quizData.length}`;
            
            const msg = document.getElementById('result-message');
            const percent = (score / quizData.length) * 100;
            if (percent === 100) msg.innerText = "Jesteś mistrzem inżynierii!";
            else if (percent >= 70) msg.innerText = "Świetny wynik!";
            else if (percent >= 50) msg.innerText = "Nieźle, ale mogło być lepiej.";
            else msg.innerText = "Warto jeszcze raz przejrzeć prezentację.";
        }

        loadQuestion();
    </script>
</body>
</html>
