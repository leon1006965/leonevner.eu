<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- Essential for the small S2 screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Downloads</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            color: #0078d7;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            border-bottom: 1px solid #eee;
            padding: 12px 5px;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-link {
            text-decoration: none;
            color: #333;
            display: block;
            font-size: 16px;
            font-weight: bold;
        }
        .download-btn {
            display: inline-block;
            margin-top: 8px;
            background-color: #28a745;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        #status {
            text-align: center;
            padding: 20px;
            font-style: italic;
            color: #666;
        }
        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>App Downloads</h1>
        <div id="status">Scanning directory...</div>
        <ul id="apk-list" class="file-list"></ul>
    </div>

    <script type="text/javascript">
        // This script automatically detects your username and repo from the URL
        // Example URL: https://username.github.io/repo-name/
        
        var listElement = document.getElementById("apk-list");
        var statusElement = document.getElementById("status");

        function getRepoInfo() {
            var host = window.location.hostname; // e.g., username.github.io
            var path = window.location.pathname; // e.g., /repo-name/
            
            var user = host.split('.')[0];
            var repo = path.split('/')[1];
            
            // Clean up repo name (remove trailing slashes or index.html)
            if (!repo || repo === "index.html") {
                // This might happen if the repo name is the same as the username (user.github.io)
                repo = host; 
            }

            return {
                user: user,
                repo: repo
            };
        }

        function loadFiles() {
            var info = getRepoInfo();
            var apiUrL = "https://api.github.com/repos/" + info.user + "/" + info.repo + "/contents/";
            
            var xhr = new XMLHttpRequest();
            xhr.open("GET", apiUrL, true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var files = JSON.parse(xhr.responseText);
                        renderList(files, info);
                    } else {
                        statusElement.innerHTML = "Error: Could not list files automatically.<br>Make sure this is hosted on GitHub Pages.";
                        statusElement.className = "error";
                    }
                }
            };
            xhr.send();
        }

        function renderList(files, info) {
            var foundApk = false;
            statusElement.style.display = "none";
            
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                
                if (file.name.toLowerCase().indexOf(".apk") !== -1) {
                    foundApk = true;
                    
                    var li = document.createElement("li");
                    li.className = "file-item";
                    
                    // Construct the download link using detected info
                    var downloadUrl = "https://raw.githubusercontent.com/" + info.user + "/" + info.repo + "/main/" + file.name;
                    
                    li.innerHTML = 
                        '<div class="file-link">' + file.name + '</div>' +
                        '<a href="' + downloadUrl + '" class="download-btn">Download APK</a>';
                    
                    listElement.appendChild(li);
                }
            }

            if (!foundApk) {
                statusElement.style.display = "block";
                statusElement.innerHTML = "No APK files found in this repository.";
            }
        }

        window.onload = loadFiles;
    </script>
</body>
</html>
