<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WormGPT</title>
    <style>
        :root {
            --primary-red: #ff4b4b;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --user-msg: #202020;
            --bot-msg: #2a0a0a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background: #000;
            border-bottom: 2px solid var(--primary-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { color: var(--primary-red); margin: 0; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }

        .controls { display: flex; gap: 10px; align-items: center; }

        #conn-status {
            font-size: 0.7rem;
            padding: 5px 10px;
            border-radius: 4px;
            background: #222;
            border: 1px solid #444;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user-message { align-self: flex-end; background: var(--user-msg); border-right: 3px solid #555; }
        .bot-message { align-self: flex-start; background: var(--bot-msg); border-left: 3px solid var(--primary-red); white-space: pre-wrap; }

        .input-area {
            padding: 20px;
            background: var(--card-bg);
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 4px;
            outline: none;
        }

        button {
            background: var(--primary-red);
            color: black;
            border: none;
            padding: 0 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        #force-btn { 
            background: #444; 
            color: white; 
            font-size: 0.7rem; 
            padding: 5px 10px; 
            height: fit-content;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>WORMGPT</h1>
        <div class="controls">
            <button id="force-btn" onclick="window.open('https://erlene-ramose-randi.ngrok-free.dev', '_blank')">FORCE CONNECT</button>
            <div id="conn-status">Checking Node...</div>
        </div>
    </header>

    <div id="chat-container">
        <div class="message bot-message">Hello. How can I help you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Message WormGPT..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const NGROK_URL = "https://erlene-ramose-randi.ngrok-free.dev";
        const MODEL_NAME = "huihui_ai/gemma3-abliterated:1b";

        async function checkConnection() {
            const statusDiv = document.getElementById('conn-status');
            try {
                const res = await fetch(`${NGROK_URL}/api/tags`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                if (res.ok) {
                    statusDiv.innerText = "Node Online";
                    statusDiv.style.color = "#4bff4b";
                } else { throw new Error(); }
            } catch (e) {
                statusDiv.innerText = "Node Offline";
                statusDiv.style.color = "#ff4b4b";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user-message');
            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            try {
                const response = await fetch(`${NGROK_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'text/plain', 
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        prompt: text,
                        stream: false
                    })
                });

                const data = await response.json();
                addMsg(data.response, 'bot-message');
            } catch (err) {
                addMsg("ERROR: Connection failed. Click 'FORCE CONNECT' and ensure Ollama is running.", 'bot-message');
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
                checkConnection();
            }
        }

        function addMsg(content, cls) {
            const div = document.createElement('div');
            div.className = `message ${cls}`;
            div.textContent = content;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        setInterval(checkConnection, 5000);
        checkConnection();
    </script>
</body>
</html>
