<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WormGPT</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { padding: 15px; border-bottom: 2px solid #ff4b4b; text-align: center; color: #ff4b4b; letter-spacing: 2px; box-shadow: 0 0 15px rgba(255, 75, 75, 0.2); }
        h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 8px; max-width: 80%; line-height: 1.4; font-size: 0.95rem; }
        .user { align-self: flex-end; background: #222; border-right: 3px solid #555; }
        .bot { align-self: flex-start; background: #2a0a0a; border-left: 3px solid #ff4b4b; white-space: pre-wrap; }
        .input-box { padding: 20px; background: #111; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 4px; outline: none; }
        input:focus { border-color: #ff4b4b; }
        button { background: #ff4b4b; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #ff6666; }
        button:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>
    <header><h1>WORMGPT</h1></header>
    <div id="chat">
        <div class="msg bot">Connection established via Serveo. System online.</div>
    </div>
    <div class="input-box">
        <input type="text" id="in" placeholder="Ask WormGPT..." autocomplete="off">
        <button id="sendBtn" onclick="send()">SEND</button>
    </div>

    <script>
        // Updated with your specific Serveo link from PowerShell
        const API_URL = "https://3e2c149afc01fe1e-178-235-254-63.serveousercontent.com"; 
        const MODEL = "huihui_ai/gemma3-abliterated:1b";

        async function send() {
            const input = document.getElementById('in');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            
            if(!text) return;

            add(text, 'user');
            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: MODEL, 
                        prompt: text, 
                        stream: false 
                    })
                });

                if (!response.ok) throw new Error('Offline');

                const data = await response.json();
                add(data.response, 'bot');
            } catch (e) {
                add("CRITICAL ERROR: Failed to reach Ollama. Ensure your PowerShell window with Serveo is still open.", 'bot');
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }

        function add(t, c) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.textContent = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('in').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') send();
        });
    </script>
</body>
</html>
