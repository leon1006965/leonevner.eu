<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdAPK Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-gradient {
            background: radial-gradient(circle at top center, #3b82f6 0%, transparent 70%);
            opacity: 0.15;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            pointer-events: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.6);
            filter: brightness(1.1);
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative">
    
    <!-- Decorative background element -->
    <div class="hero-gradient"></div>

    <main class="max-w-2xl w-full z-10">
        <div class="glass rounded-3xl p-8 md:p-12 text-center shadow-2xl border border-white/5">
            
            <!-- Branding/Logo Area -->
            <div class="mb-10 inline-block animate-float">
                <div class="text-7xl mb-6 select-none">
                    🐦
                </div>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2">
                    BirdAPK <span class="text-blue-500">Portal</span>
                </h1>
                <p class="text-slate-400 text-lg">Your premium gateway to curated APK resources.</p>
            </div>

            <!-- Action Button -->
            <div class="mt-4 mb-4">
                <a href="https://files.fm/u/2s9cg66ms8" 
                   target="_blank"
                   class="btn-primary inline-flex items-center gap-3 px-10 py-4 rounded-2xl font-bold text-white text-xl">
                    <span>View APKs</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                </a>
            </div>
        </div>

        <!-- Footer / Credits -->
        <footer class="mt-12 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800/50 border border-white/5 text-sm">
                <span class="text-slate-500">Made by</span>
                <span class="text-blue-400 font-semibold">BeluGamingTetrisbuild</span>
            </div>
            <p class="mt-4 text-slate-600 text-xs tracking-widest">EST. 2026 • BIRDAPK PORTAL</p>
        </footer>
    </main>

</body>
</html>
