<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opium OS - v0.0.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0a0a0a; color: #d1d1d1; font-family: 'Fira+Code', monospace; overflow: hidden; }
        #terminal-container { height: 100%; width: 100%; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-info { color: #4ade80; }
        .log-error { color: #f87171; }
        #input-line { display: flex; align-items: center; margin-top: 10px; }
        #prompt { color: #4ade80; margin-right: 10px; white-space: nowrap; }
        #cmd-input { background: transparent; border: none; outline: none; color: #fff; flex-grow: 1; font-family: inherit; font-size: 1rem; }
        
        /* FIXED: Added solid background and high z-index to prevent ghosting */
        #gui-layer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background-color: #020617; 
            display: none; 
            z-index: 99999; 
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="output">
            <div class="log-entry">Opium OS [Version 0.0.5]</div>
            <div class="log-entry">Kernel initialized. UI ghosting patch applied.</div>
            <br>
        </div>
        <div id="input-line">
            <span id="prompt">opium@kernel:~$</span>
            <input type="text" id="cmd-input" autofocus spellcheck="false">
        </div>
    </div>
    <div id="gui-layer"></div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        const guiLayer = document.getElementById('gui-layer');
        
        const OS_STATE = { 
            version: "0.0.5", 
            installedGui: null, 
            isGuiRunning: false,
            programs: {} 
        };

        const print = (text, type = '') => {
            const div = document.createElement('div');
            div.className = `log-entry ${type ? 'log-' + type : ''}`;
            div.innerText = text;
            output.appendChild(div);
            document.getElementById('terminal-container').scrollTop = output.scrollHeight;
            if(OS_STATE.isGuiRunning) window.dispatchEvent(new CustomEvent('opium_print', { detail: { text, type } }));
        };

        const commands = {
            'help': () => print("Commands: help, clear, import gui [url], import program [name] [url], gui, neofetch"),
            'clear': () => { output.innerHTML = ''; },
            'neofetch': () => print("Opium OS v0.0.5\nStatus: Optimized\nUI Layer: Active"),
            'import': async (args) => {
                const type = args[0];
                if (type === 'gui') {
                    try {
                        print(`Fetching GUI...`, "info");
                        const res = await fetch(args[1]);
                        OS_STATE.installedGui = await res.text();
                        print(`GUI System Updated.`, "info");
                    } catch (e) { print("Import failed: " + e.message, "error"); }
                } else if (type === 'program') {
                    const [name, url] = [args[1], args[2]];
                    try {
                        print(`Installing ${name}...`, "info");
                        const res = await fetch(url);
                        OS_STATE.programs[name] = await res.text();
                        print(`'${name}' installed.`, "info");
                        if(OS_STATE.isGuiRunning) window.dispatchEvent(new CustomEvent('opium_new_program', { detail: { name } }));
                    } catch (e) { print("Install failed: " + e.message, "error"); }
                }
            },
            'gui': () => {
                if (!OS_STATE.installedGui) return print("No GUI installed.", "error");
                guiLayer.innerHTML = OS_STATE.installedGui;
                guiLayer.style.display = 'block';
                OS_STATE.isGuiRunning = true;
                
                const scripts = Array.from(guiLayer.querySelectorAll("script"));
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    Array.from(oldScript.attributes).forEach(a => newScript.setAttribute(a.name, a.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                Object.keys(OS_STATE.programs).forEach(name => {
                    window.dispatchEvent(new CustomEvent('opium_new_program', { detail: { name } }));
                });
            }
        };

        window.OS = {
            exitGui: () => {
                guiLayer.style.display = 'none';
                guiLayer.innerHTML = '';
                OS_STATE.isGuiRunning = false;
                print("GUI Session terminated.", "info");
            },
            runCommand: (cmd) => {
                const parts = cmd.split(' ');
                const base = parts[0].toLowerCase();
                const args = parts.slice(1);
                if (commands[base]) commands[base](args);
                else if (OS_STATE.programs[base]) window.dispatchEvent(new CustomEvent('opium_run_program', { detail: { name: base, html: OS_STATE.programs[base] } }));
                else print(`Unknown command: ${base}`, "error");
            }
        };

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const val = input.value;
                input.value = '';
                window.OS.runCommand(val);
            }
        });
    </script>
</body>
</html>
