<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WormGPT Interface</title>
    <style>
        :root {
            --primary-red: #ff4b4b;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text-gray: #b0b0b0;
            --user-msg: #202020;
            --bot-msg: #2a0a0a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px;
            background: linear-gradient(to right, #1a0000, #000);
            border-bottom: 2px solid var(--primary-red);
            text-align: center;
            position: relative;
        }

        header h1 {
            color: var(--primary-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 1.5rem;
        }

        #conn-status {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            padding: 5px 10px;
            border-radius: 4px;
            background: #222;
            cursor: pointer;
            border: 1px solid #444;
            font-weight: bold;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            border-left: 3px solid #555;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg);
            border-left: 3px solid var(--primary-red);
            white-space: pre-wrap;
        }

        .status-msg {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-gray);
            margin: 10px 0;
        }

        .input-area {
            padding: 20px;
            background-color: var(--card-bg);
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #000;
            border: 1px solid #444;
            color: white;
            padding: 12px 15px;
            border-radius: 4px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-red);
        }

        button {
            background-color: var(--primary-red);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .typing {
            font-style: italic;
            color: var(--primary-red);
            font-size: 0.8rem;
            display: none;
            padding-left: 20px;
            margin-bottom: 5px;
        }

        /* Help overlay if offline */
        #offline-notice {
            display: none;
            background: #440000;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="offline-notice">
        ⚠️ NODE OFFLINE: <a href="https://erlene-ramose-randi.ngrok-free.dev" target="_blank" style="color: white; text-decoration: underline;">Click here to authorize connection</a> then refresh this page.
    </div>

    <header>
        <h1>WormGPT</h1>
        <div id="conn-status" onclick="checkConnection()">Check Node</div>
    </header>

    <div id="chat-container">
        <div class="status-msg">Connection active.</div>
        <div class="message bot-message">Hello. How can I help you today?</div>
    </div>

    <div class="typing" id="typing-indicator">WormGPT is processing...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Enter message..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const NGROK_URL = "https://erlene-ramose-randi.ngrok-free.dev";
        const MODEL_NAME = "huihui_ai/gemma3-abliterated:1b";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typing-indicator');
        const connStatus = document.getElementById('conn-status');
        const offlineNotice = document.getElementById('offline-notice');

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        async function checkConnection() {
            connStatus.textContent = "Checking...";
            try {
                // We use a simple tag fetch to bypass most CORS issues for status check
                const response = await fetch(`${NGROK_URL}/api/tags`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                if (response.ok) {
                    connStatus.textContent = "Node Online";
                    connStatus.style.color = "#4bff4b";
                    offlineNotice.style.display = "none";
                } else {
                    throw new Error();
                }
            } catch (e) {
                connStatus.textContent = "Node Offline";
                connStatus.style.color = "var(--primary-red)";
                offlineNotice.style.display = "block";
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user-message');
            userInput.value = '';
            setLoading(true);

            try {
                const endpoint = `${NGROK_URL}/api/generate`;

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        prompt: text,
                        stream: false
                    })
                });

                if (!response.ok) throw new Error(`Status: ${response.status}`);

                const data = await response.json();
                addMessage(data.response, 'bot-message');

            } catch (error) {
                console.error("Error:", error);
                addMessage("CONNECTION ERROR: The link to your PC is blocked. \n\nFIX: Click the 'authorize connection' link at the very top of this page, then click 'Visit Site' on the page that opens.", 'bot-message');
                checkConnection();
            } finally {
                setLoading(false);
            }
        }

        function addMessage(content, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function setLoading(isLoading) {
            userInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            typingIndicator.style.display = isLoading ? 'block' : 'none';
        }

        // Initial check
        checkConnection();
    </script>
</body>
</html>
